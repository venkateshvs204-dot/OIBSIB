<!DOCTYPE html>
<html>
<head>
    <title>Temperature Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #333;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Temperature Converter</h2>

    <input type="number" id="temp" placeholder="Enter Temperature">

    <select id="conversion">
        <option value="CtoF">Celsius to Fahrenheit</option>
        <option value="FtoC">Fahrenheit to Celsius</option>
    </select>

    <button onclick="convertTemp()">Convert</button>

    <div id="result"></div>
</div>

<script>
function convertTemp() {
    let temp = document.getElementById("temp").value;
    let type = document.getElementById("conversion").value;
    let result = document.getElementById("result");

    if (temp === "") {
        result.innerHTML = "Please enter a temperature!";
        result.style.color = "red";
        return;
    }

    temp = Number(temp);

    if (type === "CtoF") {
        let fahrenheit = (temp * 9/5) + 32;
        result.innerHTML = fahrenheit.toFixed(2) + " °F";
    } else {
        let celsius = (temp - 32) * 5/9;
        result.innerHTML = celsius.toFixed(2) + " °C";
    }

    result.style.color = "green";
}
</script>

</body>
</html>
